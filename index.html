<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Piet Konijn" />
  <meta name="theme-color" content="#ffe566" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <title>Philippa & Piet Konijn</title>

  <style>
    :root {
      --card: #ffffffee;
      --ink:  #2a3a50;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    #app {
      position: relative; width: 100vw; height: 100vh; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── SKY ── */
    .sky {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #aee4ff 0%, #d6f0ff 45%, #fff9e6 100%);
    }

    /* ── CLOUDS ── */
    .cloud {
      position: absolute; border-radius: 50px;
      background: #fff; opacity: .82; filter: blur(1px);
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: ''; position: absolute; background: #fff; border-radius: 50%;
    }
    .c1 { width:110px; height:38px; top: 9%; left:-130px; animation-duration:28s; animation-delay:-6s; }
    .c1::before { width:60px; height:52px; top:-24px; left:14px; }
    .c1::after  { width:40px; height:38px; top:-14px; left:54px; }
    .c2 { width: 80px; height:28px; top:19%; left:-100px; animation-duration:38s; animation-delay:-20s; opacity:.65; }
    .c2::before { width:44px; height:40px; top:-18px; left:10px; }
    .c2::after  { width:30px; height:28px; top:-10px; left:40px; }
    .c3 { width:140px; height:46px; top: 6%; left:-170px; animation-duration:48s; animation-delay:-34s; opacity:.55; }
    .c3::before { width:70px; height:60px; top:-28px; left:20px; }
    .c3::after  { width:50px; height:44px; top:-18px; left:70px; }
    @keyframes drift { from { transform:translateX(0); } to { transform:translateX(calc(100vw + 220px)); } }

    /* ── SUN ── */
    .sun {
      position: absolute; top: 6%; right: 9%;
      width: 68px; height: 68px; border-radius: 50%;
      background: radial-gradient(circle, #ffe566 55%, #ffcc00 100%);
      box-shadow: 0 0 0 14px #ffe56644, 0 0 0 28px #ffe56622;
      animation: sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 0 14px #ffe56644, 0 0 0 28px #ffe56622; }
      50%      { box-shadow: 0 0 0 20px #ffe56655, 0 0 0 40px #ffe56618; }
    }

    /* ── GROUND ── */
    .ground {
      position: absolute; left:-5vw; right:-5vw; bottom:-6vh; height:26vh;
      background: radial-gradient(ellipse at 50% 0%, #a8e060 0%, #88cc44 100%);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
      box-shadow: inset 0 8px 0 #c6ee88;
    }

    /* ── FLOWERS ── */
    .flowers {
      position: absolute; bottom: 18vh; left: 0; right: 0;
      display: flex; justify-content: space-around; padding: 0 8vw;
      pointer-events: none; z-index: 1;
    }
    .flower { font-size: clamp(22px,4vw,34px); animation: sway 3s ease-in-out infinite; }
    .flower:nth-child(2) { animation-delay:.5s; }
    .flower:nth-child(3) { animation-delay:1s;  }
    .flower:nth-child(4) { animation-delay:1.5s;}
    .flower:nth-child(5) { animation-delay:2s;  }
    @keyframes sway { 0%,100%{ transform:rotate(-6deg); } 50%{ transform:rotate(6deg); } }

    /* ── HINT ── */
    .hint {
      position: absolute; z-index: 3;
      top: max(14px, env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      background: var(--card); padding: 9px 20px;
      border-radius: 999px; font-size: clamp(15px,2.4vw,19px);
      font-weight: 600; color: var(--ink); opacity: .85;
      box-shadow: 0 4px 16px rgba(0,0,0,.08); white-space: nowrap;
    }

    /* ── STAGE ── */
    .stage {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .object-wrap {
      position: relative;
      width: min(62vw,340px); height: min(62vw,340px);
      display: flex; align-items: center; justify-content: center;
    }
    .glow-ring {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle, #ffffff88 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { transform:scale(1);    opacity:.6; }
      50%      { transform:scale(1.08); opacity:1;  }
    }
    .object-shadow {
      position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
      width: 55%; height: 18px;
      background: rgba(80,140,20,.18); border-radius: 50%; filter: blur(6px);
      animation: shadowPulse 3s ease-in-out infinite;
    }
    @keyframes shadowPulse {
      0%,100% { transform:translateX(-50%) scaleX(1);   opacity:.7; }
      50%      { transform:translateX(-50%) scaleX(1.1); opacity:.4; }
    }
    .object {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      border: none; background: none; padding: 0; cursor: pointer;
      font-size: min(42vw,230px);
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      animation: floatBob 3.2s ease-in-out infinite;
      transform-origin: center bottom;
      will-change: transform; transition: filter .15s;
    }
    @keyframes floatBob {
      0%,100% { transform:translateY(0)    rotate(0deg); }
      30%      { transform:translateY(-10px) rotate(-2deg); }
      70%      { transform:translateY(-6px)  rotate(2deg);  }
    }
    .object:active { filter: brightness(1.15); }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.55); transform: scale(0);
      pointer-events: none; animation: rippleOut .6s ease-out forwards;
    }
    @keyframes rippleOut { to { transform:scale(4); opacity:0; } }

    /* ── LABEL ── */
    .label {
      position: relative; z-index: 2; margin-top: 14px;
      background: var(--card); padding: 14px 28px; border-radius: 999px;
      font-size: clamp(24px,4.5vw,36px); font-weight: 800; color: var(--ink);
      box-shadow: 0 8px 28px rgba(0,0,0,.10); letter-spacing: .02em;
      animation: labelPop .45s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes labelPop {
      from { transform:scale(.6) translateY(10px); opacity:0; }
      to   { transform:scale(1)  translateY(0);    opacity:1; }
    }

    /* ── FX ── */
    .fx {
      position: fixed; pointer-events: none; z-index: 10;
      font-size: clamp(36px,6vw,58px);
      animation: fxFly 1.1s cubic-bezier(.22,.68,0,1.2) forwards;
      will-change: transform, opacity;
    }
    @keyframes fxFly {
      0%   { transform:translate(-50%,-50%) scale(.2) rotate(-15deg); opacity:0; }
      18%  { opacity:1; }
      100% { transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.6) rotate(20deg); opacity:0; }
    }
    .star-burst {
      position: fixed; pointer-events: none; z-index: 9;
      border-radius: 50%; animation: starFly .9s ease-out forwards;
    }
    @keyframes starFly {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--sx),var(--sy)) scale(0); opacity:0; }
    }

    /* ── TOOLBAR ── */
    .toolbar {
      position: absolute; right: 14px;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 4; display: flex; gap: 10px;
    }
    .btn {
      border: none; border-radius: 999px; padding: 13px 18px;
      font-size: 16px; font-weight: 700;
      background: var(--card); color: var(--ink);
      box-shadow: 0 6px 20px rgba(0,0,0,.10);
      cursor: pointer; transition: transform .12s;
    }
    .btn:active { transform: scale(.93); }

    /* ── CURTAIN ── */
    .curtain {
      position: fixed; inset: 0; z-index: 8; pointer-events: none;
      background: #fff; opacity: 0; transition: opacity .25s ease;
    }
    .curtain.flash { opacity: .45; }

    /* ── ANIMATIONS ── */
    .wiggle   { animation: wiggle .5s cubic-bezier(.36,.07,.19,.97) both !important; }
    @keyframes wiggle {
      0%  { transform:rotate(0); }
      15% { transform:rotate(-10deg) scale(1.08); }
      35% { transform:rotate(10deg)  scale(1.12); }
      55% { transform:rotate(-7deg)  scale(1.08); }
      75% { transform:rotate(5deg)   scale(1.04); }
      100%{ transform:rotate(0)      scale(1);    }
    }
    .entrance { animation: entrance .5s cubic-bezier(.34,1.56,.64,1) both !important; }
    @keyframes entrance {
      from { transform:scale(.3) translateY(40px); opacity:0; }
      to   { transform:scale(1)  translateY(0);    opacity:1; }
    }

    /* ── WELCOME SCREEN ── */
    #welcomeScreen {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #aee4ff 0%, #d6f0ff 40%, #fff9e6 100%);
      gap: clamp(18px, 4vh, 36px);
    }
    #welcomeScreen.hiding {
      animation: welcomeOut .7s cubic-bezier(.7,0,.3,1) forwards;
    }
    @keyframes welcomeOut {
      0%   { opacity:1; transform:scale(1); }
      100% { opacity:0; transform:scale(1.08); pointer-events:none; }
    }
    .welcome-rabbit {
      font-size: clamp(90px, 20vw, 160px);
      animation: welcomeBob 2.2s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.12));
    }
    @keyframes welcomeBob {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-18px) rotate(4deg); }
    }
    .welcome-title {
      font-size: clamp(28px, 6vw, 56px);
      font-weight: 900; color: var(--ink);
      text-align: center; line-height: 1.2;
      text-shadow: 0 3px 0 rgba(255,255,255,.7);
    }
    .welcome-title span {
      display: block;
      font-size: clamp(44px, 10vw, 88px);
      background: linear-gradient(135deg, #ff8fab 0%, #ffcc00 50%, #6ec6ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; background-size: 200% 200%;
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    .welcome-stars {
      font-size: clamp(22px, 4vw, 34px); letter-spacing: 8px;
      animation: starTwinkle 1.8s ease-in-out infinite;
    }
    @keyframes starTwinkle {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.9); }
    }
    .welcome-btn {
      border: none; border-radius: 999px;
      padding: clamp(18px,3vh,26px) clamp(40px,8vw,70px);
      font-size: clamp(22px,4vw,34px); font-weight: 900;
      background: linear-gradient(135deg, #ffe566, #ffb830);
      color: #2a3a50;
      box-shadow: 0 10px 36px rgba(255,200,0,.4), 0 2px 0 #cc9900;
      cursor: pointer; letter-spacing: .02em;
      animation: btnPulse 2s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%,100% { transform:scale(1);    box-shadow:0 10px 36px rgba(255,200,0,.4),0 2px 0 #cc9900; }
      50%      { transform:scale(1.05); box-shadow:0 14px 44px rgba(255,200,0,.55),0 2px 0 #cc9900; }
    }
    .welcome-btn:active { transform: scale(.96) !important; }
    .wconf {
      position: absolute; pointer-events: none;
      font-size: clamp(20px,3vw,30px);
      animation: wconfFloat linear infinite; opacity: .7;
    }
    @keyframes wconfFloat {
      0%   { transform:translateY(110vh) rotate(0deg);   opacity:0; }
      10%  { opacity:.7; }
      90%  { opacity:.7; }
      100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
    }

    /* ── INSTALL BANNER (shown first time) ── */
    .install-banner {
      position: fixed; bottom: max(80px, env(safe-area-inset-bottom, 0px) + 80px);
      left: 50%; transform: translateX(-50%);
      background: #243447ee; color: #fff;
      padding: 14px 22px; border-radius: 16px;
      font-size: clamp(13px,2vw,16px); font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      z-index: 20; max-width: 88vw; text-align: center;
      line-height: 1.5;
      animation: slideUp .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp {
      from { transform:translateX(-50%) translateY(30px); opacity:0; }
      to   { transform:translateX(-50%) translateY(0);    opacity:1; }
    }
    .install-banner .close-btn {
      display: inline-block; margin-top: 10px;
      background: #ffe566; color: #243447;
      border: none; border-radius: 999px;
      padding: 7px 18px; font-weight: 800; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ── WELCOME SCREEN ── -->
<div id="welcomeScreen">
  <div class="wconf" style="left:8%;  animation-duration:7s;  animation-delay:0s">🌟</div>
  <div class="wconf" style="left:22%; animation-duration:9s;  animation-delay:-3s">🎈</div>
  <div class="wconf" style="left:40%; animation-duration:6s;  animation-delay:-1s">✨</div>
  <div class="wconf" style="left:60%; animation-duration:11s; animation-delay:-5s">🌸</div>
  <div class="wconf" style="left:75%; animation-duration:8s;  animation-delay:-2s">⭐</div>
  <div class="wconf" style="left:88%; animation-duration:10s; animation-delay:-4s">💛</div>
  <div class="welcome-rabbit">🐰</div>
  <div class="welcome-title">Welkom<br><span>Philippa!</span></div>
  <div class="welcome-stars">⭐ 🌟 ✨ 🌟 ⭐</div>
  <button class="welcome-btn" id="startBtn">Spelen! 🎉</button>
</div>

<div id="app">
  <div class="sky"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="sun"></div>
  <div class="ground"></div>
  <div class="flowers">
    <span class="flower">🌷</span>
    <span class="flower">🌼</span>
    <span class="flower">🌺</span>
    <span class="flower">🌻</span>
    <span class="flower">🌸</span>
  </div>

  <div class="hint">Tik op het plaatje 👆</div>

  <div class="stage">
    <div class="object-wrap">
      <div class="glow-ring"></div>
      <button class="object" id="objectBtn" aria-label="Speel object"></button>
      <div class="object-shadow"></div>
    </div>
    <div class="label" id="label"></div>
  </div>

  <div class="toolbar">
    <button class="btn" id="soundBtn">🔊</button>
    <button class="btn" id="nextBtn">✨ Nieuw</button>
  </div>

  <div class="curtain" id="curtain"></div>
</div>

<!-- Install banner (Safari/iOS) -->
<div class="install-banner" id="installBanner" style="display:none">
  📲 <strong>Voeg toe aan beginscherm!</strong><br>
  Tik op <strong>Deel ↑</strong> dan <strong>"Zet op beginscherm"</strong>
  <br><button class="close-btn" id="closeBanner">Begrepen ✓</button>
</div>

<script>
/* ─────────────────────────────────────────
   DATA
───────────────────────────────────────── */
const items = [
  { emoji:"🐰", name:"Piet Konijn", fx:["✨","🌟","💛","🥕"], colors:["#ffe566","#ffb3ec","#a3f0a3"], speech:"boing"  },
  { emoji:"🎈", name:"Ballon",      fx:["🎈","✨","☁️","🌈"],  colors:["#ff6eb4","#ffe566","#6ec6ff"], speech:"plop"   },
  { emoji:"🐟", name:"Vis",         fx:["💦","🫧","⭐","💙"],  colors:["#6ec6ff","#a3f0ff","#ffe566"], speech:"blub"   },
  { emoji:"🌸", name:"Bloem",       fx:["🌸","💖","✨","🦋"],  colors:["#ffb3ec","#ff6eb4","#fff566"], speech:"pling"  },
  { emoji:"⭐", name:"Ster",        fx:["⭐","✨","🌟","💫"],  colors:["#ffe566","#fff0a0","#ffd700"], speech:"ting"   },
  { emoji:"🦆", name:"Eend",        fx:["💦","🫧","✨","🌿"],  colors:["#ffe566","#6ec6ff","#a3f0a3"], speech:"kwaak"  },
  { emoji:"🐻", name:"Beer",        fx:["💛","✨","⭐","🍯"],  colors:["#ffcc88","#ffe566","#ffb870"], speech:"bom"    },
  { emoji:"🚗", name:"Auto",        fx:["💨","✨","⭐","🛣️"],  colors:["#ff6e6e","#6ec6ff","#ffe566"], speech:"vroem"  },
  { emoji:"🦁", name:"Leeuw",       fx:["👑","✨","🌟","💛"],  colors:["#ffcc66","#ff9933","#ffe566"], speech:"bom"    },
  { emoji:"🐸", name:"Kikker",      fx:["🌿","💧","✨","🍃"],  colors:["#a3f0a3","#6ec6ff","#ffe566"], speech:"blub"   },
  { emoji:"🦋", name:"Vlinder",     fx:["🌸","💖","✨","🌈"],  colors:["#ffb3ec","#b3d9ff","#ffe566"], speech:"pling"  },
  { emoji:"🐄", name:"Koe",         fx:["🌿","⭐","💛","🍀"],  colors:["#fff","#ffcc66","#a3f0a3"],   speech:"bom"    },
  { emoji:"🐶", name:"Hond",        fx:["🦴","💛","✨","⭐"],  colors:["#ffcc88","#ffe566","#ffb3ec"], speech:"bom"    },
  { emoji:"🐱", name:"Kat",         fx:["🐾","💖","✨","🌸"],  colors:["#ffb3ec","#ffe566","#a3f0a3"], speech:"pling"  },
  { emoji:"🐥", name:"Kuiken",      fx:["🌿","⭐","💛","✨"],  colors:["#ffe566","#fff0a0","#a3f0a3"], speech:"ting"   },
  { emoji:"🍎", name:"Appel",       fx:["🍎","✨","💚","⭐"],  colors:["#ff6e6e","#a3f0a3","#ffe566"], speech:"pling"  },
  { emoji:"🌙", name:"Maan",        fx:["⭐","🌟","💫","✨"],  colors:["#fff0a0","#ffe566","#b3d9ff"], speech:"ting"   },
  { emoji:"🚂", name:"Trein",       fx:["💨","⭐","✨","🛤️"],  colors:["#ff6e6e","#ffe566","#6ec6ff"], speech:"vroem"  },
  { emoji:"🐑", name:"Schaap",      fx:["☁️","✨","💛","🌿"],  colors:["#fff","#a3f0a3","#ffe566"],   speech:"bom"    },
  { emoji:"🍌", name:"Banaan",      fx:["🍌","✨","💛","⭐"],  colors:["#ffe566","#ffcc00","#fff0a0"], speech:"pling"  },
  { emoji:"☀️", name:"Zon",         fx:["☀️","✨","🌟","💛"],  colors:["#ffe566","#ffcc00","#fff0a0"], speech:"ting"   },
  { emoji:"🐘", name:"Olifant",     fx:["💦","⭐","✨","🌿"],  colors:["#b3d9ff","#a0a0c0","#ffe566"], speech:"bom"    },
  { emoji:"🎵", name:"Muziek",      fx:["🎵","🎶","✨","⭐"],  colors:["#ffb3ec","#b3d9ff","#ffe566"], speech:"pling"  },
  { emoji:"🌈", name:"Regenboog",   fx:["🌈","✨","💖","🌟"],  colors:["#ff6eb4","#ffe566","#6ec6ff"], speech:"ting"   },
  { emoji:"🐢", name:"Schildpad",   fx:["🌿","💧","✨","🍃"],  colors:["#a3f0a3","#ffe566","#6ec6ff"], speech:"blub"   },
];

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const objectBtn = document.getElementById("objectBtn");
const label     = document.getElementById("label");
const nextBtn   = document.getElementById("nextBtn");
const soundBtn  = document.getElementById("soundBtn");
const curtain   = document.getElementById("curtain");
const app       = document.getElementById("app");

let current  = null;
let soundOn  = true;
let audioCtx = null;
let busy     = false;

function rand(n) { return Math.floor(Math.random() * n); }

/* ─────────────────────────────────────────
   AUDIO
───────────────────────────────────────── */
function ensureAudio() {
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) audioCtx = new Ctx();
  }
  if (audioCtx?.state === "suspended") audioCtx.resume();
}

function beep(kind = "soft") {
  if (!soundOn) return;
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const map = {
    soft:  [[440,660],  0.06,"sine",     0.16],
    boing: [[260,390],  0.07,"sine",     0.20],
    plop:  [[520,320],  0.07,"triangle", 0.18],
    blub:  [[300,240],  0.06,"sine",     0.18],
    pling: [[780,980],  0.05,"sine",     0.14],
    ting:  [[660,880],  0.05,"sine",     0.14],
    kwaak: [[240,190],  0.07,"square",   0.18],
    bom:   [[130,100],  0.09,"triangle", 0.22],
    vroem: [[140,250],  0.08,"sawtooth", 0.24],
  };
  const [freqs, vol, type, dur] = map[kind] || map.soft;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freqs[0], now);
  o.frequency.exponentialRampToValueAtTime(freqs[1], now + dur * .6);
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.025);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now + dur + 0.05);
}

function chime() {
  if (!soundOn) return;
  ensureAudio();
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [[523,0],[659,0.18],[784,0.34]].forEach(([f,t]) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine"; o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, now+t);
    g.gain.exponentialRampToValueAtTime(0.045, now+t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now+t+0.28);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(now+t); o.stop(now+t+0.3);
  });
}

/* ── Voice cache: geladen zodra beschikbaar ── */
let _nlVoice = null;

function _pickVoice(voices) {
  const pref = ["Siri","Fem","Ellen","Flo","Samantha","Xander"];
  for (const p of pref) {
    const v = voices.find(x => x.lang.startsWith("nl") && x.name.includes(p));
    if (v) return v;
  }
  const fem = voices.find(x => x.lang.startsWith("nl") && /female|vrouw|fem/i.test(x.name));
  if (fem) return fem;
  return voices.find(x => x.lang.startsWith("nl")) || null;
}

function _loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (voices.length) { _nlVoice = _pickVoice(voices); return true; }
  return false;
}

// Safari vuurt voiceschanged meerdere keren — sla de beste stem op zodra ze beschikbaar zijn
if ("speechSynthesis" in window) {
  _loadVoices();
  speechSynthesis.addEventListener("voiceschanged", () => { _loadVoices(); });
}

function speak(name) {
  if (!soundOn || !("speechSynthesis" in window)) return;

  const list = phrases[name] || [name];
  const text = list[rand(list.length)];

  function _doSpeak() {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang   = "nl-NL";
    utter.rate   = 0.78;
    utter.pitch  = 1.15;
    utter.volume = 0.95;

    // Gebruik gecachte stem, of probeer nog één keer te laden
    if (!_nlVoice) _loadVoices();
    if (_nlVoice) utter.voice = _nlVoice;

    speechSynthesis.speak(utter);
  }

  // Als stemmen al geladen zijn: spreek direct (na chime-delay)
  if (_nlVoice || speechSynthesis.getVoices().length > 0) {
    setTimeout(_doSpeak, 420);
  } else {
    // Stemmen nog niet beschikbaar: wacht op voiceschanged
    speechSynthesis.addEventListener("voiceschanged", () => {
      _loadVoices();
      setTimeout(_doSpeak, 420);
    }, { once: true });
  }
}

/* ─────────────────────────────────────────
   PARTICLES
───────────────────────────────────────── */
function burst(x, y) {
  for (let i = 0; i < 10; i++) {
    const el = document.createElement("div");
    el.className = "fx";
    el.textContent = current.fx[rand(current.fx.length)];
    const dx = (Math.random()*280-140).toFixed(0)+"px";
    const dy = (Math.random()*260-130).toFixed(0)+"px";
    el.style.cssText = `left:${x}px;top:${y}px;--dx:${dx};--dy:${dy};animation-delay:${rand(120)}ms`;
    app.appendChild(el);
    setTimeout(() => el.remove(), 1250);
  }
  for (let i = 0; i < 16; i++) {
    const el = document.createElement("div");
    el.className = "star-burst";
    const color = current.colors[rand(current.colors.length)];
    const angle = (i/16)*360;
    const dist  = 60 + rand(110);
    const sx = (Math.cos(angle*Math.PI/180)*dist).toFixed(1)+"px";
    const sy = (Math.sin(angle*Math.PI/180)*dist).toFixed(1)+"px";
    el.style.cssText = `left:${x}px;top:${y}px;background:${color};--sx:${sx};--sy:${sy};width:${8+rand(9)}px;height:${8+rand(9)}px;`;
    app.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
  // Ripple on button
  const rip = document.createElement("div");
  rip.className = "ripple";
  const rect = objectBtn.getBoundingClientRect();
  rip.style.cssText = `width:${rect.width}px;height:${rect.height}px;left:0;top:0;position:absolute;`;
  objectBtn.appendChild(rip);
  setTimeout(() => rip.remove(), 640);
}

/* ─────────────────────────────────────────
   GAME LOGIC
───────────────────────────────────────── */
function chooseNext(animate = true) {
  let pick = items[rand(items.length)];
  if (current && items.length > 1) {
    while (pick.name === current.name) pick = items[rand(items.length)];
  }
  current = pick;
  objectBtn.textContent = current.emoji;
  label.textContent = current.name;
  label.style.animation = "none";
  void label.offsetWidth;
  label.style.animation = "";
  if (animate) {
    objectBtn.classList.remove("wiggle","entrance");
    void objectBtn.offsetWidth;
    objectBtn.classList.add("entrance");
    objectBtn.addEventListener("animationend", () => objectBtn.classList.remove("entrance"), { once:true });
  }
}

objectBtn.addEventListener("pointerdown", (ev) => {
  if (busy) return;
  busy = true;
  ensureAudio();
  objectBtn.classList.remove("wiggle","entrance");
  void objectBtn.offsetWidth;
  objectBtn.classList.add("wiggle");
  beep(current.speech);
  chime();
  speak(current.name);
  burst(ev.clientX, ev.clientY);
  curtain.classList.add("flash");
  setTimeout(() => curtain.classList.remove("flash"), 250);
  setTimeout(() => { chooseNext(true); busy = false; }, 820);
});

nextBtn.addEventListener("click", () => { ensureAudio(); beep("soft"); chooseNext(true); });

soundBtn.addEventListener("click", () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? "🔊" : "🔇";
  if (soundOn) { ensureAudio(); beep("soft"); }
});

document.body.addEventListener("click",      ensureAudio, { once:true });
document.body.addEventListener("touchstart", ensureAudio, { once:true, passive:true });
